name: AI Code Review

# Trigger: chạy mỗi khi PR được mở, push commit mới, hoặc mở lại.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read          # đọc code
  pull-requests: write    # cần quyền này để comment vào PR

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        # GitHub tự cấp, không cần tạo
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # tự thêm trong repo Settings > Secrets
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python review_agent.py
